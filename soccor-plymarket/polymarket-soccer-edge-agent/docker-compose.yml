services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edge
      POSTGRES_USER: edge
      POSTGRES_PASSWORD: edge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edge -d edge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://edge:edge@postgres:5432/edge
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: rq worker edge-jobs --url redis://redis:6379/0
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://edge:edge@postgres:5432/edge
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file: .env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules

volumes:
  postgres-data:

